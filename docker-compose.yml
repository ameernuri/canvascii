services:
  canvascii-postgres:
    image: postgres:16
    container_name: canvascii-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: canvascii
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5004:5432"
    volumes:
      - canvascii_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d canvascii"]
      interval: 5s
      timeout: 5s
      retries: 20

  canvascii-minio:
    image: minio/minio:latest
    container_name: canvascii-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "5005:9000"
      - "5006:9001"
    volumes:
      - canvascii_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  canvascii-minio-init:
    image: minio/mc:latest
    container_name: canvascii-minio-init
    depends_on:
      canvascii-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set canvascii http://canvascii-minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing canvascii/canvascii-dev
      "
    restart: "no"

  canvascii-postgres-init:
    image: postgres:16
    container_name: canvascii-postgres-init
    depends_on:
      canvascii-postgres:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      psql postgresql://user:password@canvascii-postgres:5432/postgres -tAc \"SELECT 1 FROM pg_database WHERE datname = 'canvascii'\" | grep -q 1 ||
      psql postgresql://user:password@canvascii-postgres:5432/postgres -c \"CREATE DATABASE canvascii\"
      "
    restart: "no"

  canvascii-app:
    build:
      context: .
      dockerfile: apps/canvascii/Dockerfile
    container_name: canvascii-app
    restart: unless-stopped
    depends_on:
      canvascii-postgres:
        condition: service_healthy
      canvascii-postgres-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://user:password@canvascii-postgres:5432/canvascii
      BETTER_AUTH_URL: http://127.0.0.1:5001
      BETTER_AUTH_SECRET: canvascii-local-dev-secret-2026-change-me
      BETTER_AUTH_TRUSTED_ORIGINS: http://localhost:5001,http://127.0.0.1:5001
      CANVASCII_LIBRARY_ROOT: /data/library
      NEXT_PUBLIC_CANVASCII_COLLAB_URL: ws://127.0.0.1:5002
    command: sh -lc "pnpm --filter @canvascii/app auth:migrate && pnpm --filter @canvascii/app start"
    ports:
      - "5001:5001"
    volumes:
      - canvascii_app_data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5001/sign-in').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 30

  canvascii-collab:
    build:
      context: .
      dockerfile: apps/canvascii-collab/Dockerfile
    container_name: canvascii-collab
    restart: unless-stopped
    depends_on:
      canvascii-app:
        condition: service_healthy
      canvascii-minio:
        condition: service_healthy
      canvascii-minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://user:password@canvascii-postgres:5432/canvascii
      CANVASCII_COLLAB_PORT: 5002
      CANVASCII_COLLAB_HEALTH_PORT: 5003
      CANVASCII_COLLAB_API_ORIGIN: http://canvascii-app:5001
      CANVASCII_COLLAB_TRUSTED_ORIGINS: http://localhost:5001,http://127.0.0.1:5001
      CANVASCII_COLLAB_SNAPSHOT_DIR: /data/snapshots
      CANVASCII_COLLAB_S3_ENDPOINT: http://canvascii-minio:9000
      CANVASCII_COLLAB_S3_REGION: us-east-1
      CANVASCII_COLLAB_S3_BUCKET: canvascii-dev
      CANVASCII_COLLAB_S3_ACCESS_KEY: minioadmin
      CANVASCII_COLLAB_S3_SECRET_KEY: minioadmin
      CANVASCII_COLLAB_S3_FORCE_PATH_STYLE: "true"
      CANVASCII_COLLAB_ALLOW_DEV_AUTH_BYPASS: "true"
      CANVASCII_COLLAB_DEV_BYPASS_USER_ID: canvascii-dev-user
    ports:
      - "5002:5002"
      - "5003:5003"
    volumes:
      - canvascii_collab_data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5003/health').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  canvascii_app_data:
  canvascii_postgres_data:
  canvascii_minio_data:
  canvascii_collab_data:
